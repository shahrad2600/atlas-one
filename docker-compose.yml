###############################################################################
# Atlas One — Docker Compose (Development Infrastructure)
###############################################################################

name: atlas-one

services:
  # ── PostgreSQL 15 with pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: atlas-postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-atlas_dev}
      POSTGRES_USER: ${DATABASE_USER:-atlas}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-atlas_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-atlas} -d ${DATABASE_NAME:-atlas_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - atlas-network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - atlas-network

  # ── Kafka (placeholder — uncomment when needed) ─────────────
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   container_name: atlas-zookeeper
  #   restart: unless-stopped
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   ports:
  #     - "2181:2181"
  #   networks:
  #     - atlas-network
  #
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   container_name: atlas-kafka
  #   restart: unless-stopped
  #   depends_on:
  #     zookeeper:
  #       condition: service_started
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #   networks:
  #     - atlas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  atlas-network:
    driver: bridge
