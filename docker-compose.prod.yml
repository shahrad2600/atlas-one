  ###########################################################################
  # Reverse Proxy
  ###########################################################################

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: atlas-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - admin
      - concierge
      - identity-service
      - commerce-service
      - dining-service
      - trip-service
      - travel-graph-service
      - search-service
      - stay-service
      - flight-service
      - experiences-service
      - insurance-service
      - finance-service
      - messaging-service
      - luxury-service
      - trust-service
      - ai-orchestrator
      - social-service
      - loyalty-service
      - business-service
      - content-service
      - rental-service
      - cruise-service
    networks:
      - atlas-network

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: atlas-prod-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Initial certificate generation:
    #   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
    #     --webroot -w /var/www/certbot \
    #     -d sarve.com -d www.sarve.com \
    #     -d admin.sarve.com -d concierge.sarve.com \
    #     -d api.sarve.com \
    #     --email admin@sarve.com --agree-tos --no-eff-email
    #
    # Renewal (run via cron every 12 hours):
    #   docker compose -f docker-compose.prod.yml run --rm certbot renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - atlas-network

###############################################################################
# Volumes & Networks
###############################################################################

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  atlas-network:
    driver: bridge
