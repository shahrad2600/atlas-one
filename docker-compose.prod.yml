###############################################################################
# Atlas One — Docker Compose (Production)
# Domain: sarve.com | DNS: IONOS
###############################################################################

name: atlas-one-prod

x-service-common: &service-common
  restart: unless-stopped
  networks:
    - atlas-network
  environment: &service-env
    NODE_ENV: production
    DATABASE_URL: postgresql://${DATABASE_USER:-atlas}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-atlas_prod}?sslmode=disable
    REDIS_URL: redis://redis:6379
    JWT_SECRET: ${JWT_SECRET}
    JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    CORS_ORIGIN: ${CORS_ORIGIN:-https://sarve.com}

x-service-depends: &service-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

###############################################################################
# Infrastructure
###############################################################################

services:
  # ── PostgreSQL 15 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: atlas-prod-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-atlas_prod}
      POSTGRES_USER: ${DATABASE_USER:-atlas}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-atlas} -d ${DATABASE_NAME:-atlas_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atlas-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atlas-prod-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - atlas-network
    deploy:
      resources:
        limits:
          memory: 512M

  ###########################################################################
  # Microservices (21)
  ###########################################################################

  # ── identity-service (4001) ──────────────────────────────────────────────
  identity-service:
    <<: *service-common
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: identity-service
    container_name: atlas-prod-identity
    expose:
      - "4001"
    environment:
      <<: *service-env
      PORT: "4001"
      SERVICE_NAME: identity-service
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

