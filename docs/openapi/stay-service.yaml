    # ── Damage Claims ────────────────────────────────────────────────────
    DamageClaim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reservation_id:
          type: string
          format: uuid
        claimant_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0
        currency:
          type: string
        description:
          type: string
        evidence:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [photo, video, receipt, document]
              url:
                type: string
                format: uri
              description:
                type: string
              uploaded_at:
                type: string
                format: date-time
        status:
          type: string
          enum:
            - submitted
            - under_review
            - approved
            - partially_approved
            - denied
            - resolved
        resolution:
          type: object
          nullable: true
          properties:
            amount_approved:
              type: number
              format: double
            note:
              type: string
            resolved_at:
              type: string
              format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDamageClaimRequest:
      type: object
      required: [amount, description, evidence]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        description:
          type: string
          minLength: 10
          maxLength: 5000
        evidence:
          type: array
          items:
            type: object
            required: [type, url]
            properties:
              type:
                type: string
                enum: [photo, video, receipt, document]
              url:
                type: string
                format: uri
              description:
                type: string
          minItems: 1

