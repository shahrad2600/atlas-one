          properties:
            messages:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/PropertyMessage'
                cursor:
                  $ref: '#/components/schemas/Cursor'
                total:
                  type: integer

    # ── Intelligence ─────────────────────────────────────────────────────
    PropertyIntelligence:
      type: object
      properties:
        property_id:
          type: string
          format: uuid
        overall_score:
          type: number
          format: double
          minimum: 0
          maximum: 100
        scores:
          type: object
          properties:
            listing_quality:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: Completeness and quality of listing content
            pricing_competitiveness:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: How competitive pricing is vs comparable listings
            guest_satisfaction:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: Aggregate guest review sentiment score
            response_quality:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: Host responsiveness and communication quality
            booking_performance:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: Occupancy rate and booking conversion
            photo_quality:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: AI-assessed photo quality and coverage
        recommendations:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              priority:
                type: string
                enum: [low, medium, high]
              title:
                type: string
              description:
                type: string
        computed_at:
          type: string
          format: date-time
