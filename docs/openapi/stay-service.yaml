      type: object
      properties:
        status:
          type: string
          enum: [approved, partially_approved, denied, resolved]
        resolution:
          type: object
          properties:
            amount_approved:
              type: number
              format: double
              minimum: 0
            note:
              type: string
              maxLength: 2000

