      type: object
      required: [body]
      properties:
        thread_id:
          type: string
          format: uuid
          description: Existing thread ID, or omit to create a new thread
        reservation_id:
          type: string
          format: uuid
          description: Link message to a reservation
        body:
          type: string
          minLength: 1
          maxLength: 10000
        content_type:
          type: string
          enum: [text, html]
          default: text

    PropertyThread:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        reservation_id:
          type: string
          format: uuid
          nullable: true
        participants:
          type: array
          items:
            type: object
            properties:
              user_id:
                type: string
                format: uuid
              role:
                type: string
                enum: [guest, host]
              display_name:
                type: string
        last_message_at:
          type: string
          format: date-time
        last_message_preview:
          type: string
        unread_count:
          type: integer
        created_at:
          type: string
          format: date-time

