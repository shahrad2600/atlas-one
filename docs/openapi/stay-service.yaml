    PropertyMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thread_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        body:
          type: string
        content_type:
          type: string
          enum: [text, html]
          default: text
        created_at:
          type: string
          format: date-time

