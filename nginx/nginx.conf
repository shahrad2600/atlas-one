        }

        # ── Cruise Service (/cruises/) ────────────────────────────────────
        location /cruises/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://cruise_svc/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
