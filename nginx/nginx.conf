###############################################################################
# Atlas One — Nginx Reverse Proxy Configuration
# Domain: sarve.com | DNS: IONOS
###############################################################################

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Gzip Compression ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Client Body ───────────────────────────────────────────────────────
    client_max_body_size       50m;
    client_body_buffer_size    128k;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;

    # ── Proxy Buffers ─────────────────────────────────────────────────────
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── Rate Limiting Zones ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:20m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m      rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_search:10m    rate=20r/s;
    limit_req_zone $binary_remote_addr zone=web_general:20m   rate=50r/s;
    limit_req_status 429;

    # ── Upstream Definitions ──────────────────────────────────────────────

    # Next.js Apps
    upstream web_app          { server web:3000;               }
    upstream admin_app        { server admin:3001;             }
    upstream concierge_app    { server concierge:3002;         }

    # Microservices
    upstream identity_svc     { server identity-service:4001;  }
    upstream commerce_svc     { server commerce-service:4002;  }
    upstream dining_svc       { server dining-service:4003;    }
    upstream trip_svc         { server trip-service:4004;      }
    upstream graph_svc        { server travel-graph-service:4005; }
    upstream search_svc       { server search-service:4006;    }
    upstream stay_svc         { server stay-service:4007;      }
    upstream flight_svc       { server flight-service:4008;    }
    upstream experiences_svc  { server experiences-service:4009; }
    upstream insurance_svc    { server insurance-service:4010; }
    upstream finance_svc      { server finance-service:4011;   }
    upstream messaging_svc    { server messaging-service:4012; }
    upstream luxury_svc       { server luxury-service:4013;    }
    upstream trust_svc        { server trust-service:4014;     }
    upstream ai_svc           { server ai-orchestrator:4015;   }
    upstream social_svc       { server social-service:4016;    }
    upstream loyalty_svc      { server loyalty-service:4017;   }
    upstream business_svc     { server business-service:4018;  }
    upstream content_svc      { server content-service:4019;   }
    upstream rental_svc       { server rental-service:4020;    }
    upstream cruise_svc       { server cruise-service:4021;    }

    # ── Common Proxy Headers (included via snippet) ───────────────────────
    # Defined inline in location blocks via proxy_set_header directives.

    ###########################################################################
    # HTTP → HTTPS Redirect (all domains)
    ###########################################################################
    server {
        listen 80;
        listen [::]:80;
        server_name sarve.com www.sarve.com admin.sarve.com concierge.sarve.com api.sarve.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    ###########################################################################
    # sarve.com — Main Web App
    ###########################################################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name sarve.com www.sarve.com;

        # ── SSL Configuration ─────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/sarve.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sarve.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"         always;
        add_header X-Content-Type-Options   "nosniff"            always;
        add_header X-XSS-Protection         "1; mode=block"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;

        # ── www → apex redirect ───────────────────────────────────────────
        if ($host = www.sarve.com) {
            return 301 https://sarve.com$request_uri;
        }

        # ── Rate Limiting ─────────────────────────────────────────────────
        limit_req zone=web_general burst=80 nodelay;

        # ── Next.js App ───────────────────────────────────────────────────
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_cache_bypass                 $http_upgrade;
            proxy_read_timeout                 60s;
            proxy_connect_timeout              10s;
        }

        # ── Next.js static assets (long cache) ───────────────────────────
        location /_next/static/ {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    ###########################################################################
    # admin.sarve.com — Admin Dashboard
    ###########################################################################
    server {
        listen 443 ssl http2;
