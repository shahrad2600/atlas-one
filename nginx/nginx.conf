        }

        # ── Health check endpoint ─────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Catch-all 404 ─────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not_found","message":"Unknown API route"}';
            add_header Content-Type application/json;
        }
    }
